name: Android Release APK

# Builds an installable APK whenever a version tag is pushed (e.g. v1.0.0) and
# attaches it to the corresponding GitHub Release. Also runnable manually.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Provide google-services.json
        # Store the file's contents base64-encoded in the GOOGLE_SERVICES_JSON secret:
        #   base64 -w0 android/app/google-services.json | clip   (or | pbcopy on macOS)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set — add it in repo Settings > Secrets."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Provide release keystore
        # Base64 of your release.jks, stored in the KEYSTORE_BASE64 secret.
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set — add it so Google Sign-In works with a stable SHA-1."
            exit 1
          fi
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore/release.jks

      - name: Run unit tests
        run: gradle -p android testDebugUnitTest

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        # releaseVersion drives versionName/versionCode (see app/build.gradle.kts) so the
        # built APK reports the same version as this GitHub release; the in-app update
        # checker relies on that match.
        run: gradle -p android assembleRelease -PreleaseVersion=${{ github.ref_name }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk "dist/duitrip-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: duitrip-apk
          path: dist/*.apk

      - name: Attach APK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
