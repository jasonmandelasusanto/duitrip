name: Android Tests

# Fast JVM unit tests on every push and PR — logic (splits, settlement, analytics,
# currency) + the Firestore-model serialization guard. No emulator, ~1-2 min.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Provide google-services.json
        # The Google-Services Gradle plugin needs this file even to compile the debug
        # variant the unit tests run against. Stored base64 in the secret.
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set — add it in repo Settings > Secrets."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Run unit tests
        run: gradle -p android testDebugUnitTest
