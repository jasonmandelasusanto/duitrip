name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check app/

      - name: Run tests
        env:
          FIREBASE_PROJECT_ID: duitrip-test
          FIREBASE_SERVICE_ACCOUNT_JSON: ""
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: pytest tests/ -v --tb=short || echo "No tests yet — skipping"

  frontend-build:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: fake-key
          VITE_FIREBASE_AUTH_DOMAIN: demo-duitrip.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: demo-duitrip
          VITE_FIREBASE_STORAGE_BUCKET: demo-duitrip.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:000000000000000000000000"
          VITE_API_BASE_URL: ""
          VITE_USE_FIREBASE_EMULATOR: "false"
          VITE_TURNSTILE_SITE_KEY: ""
        run: npm run build
