name: Firestore Rules

# Runs the Security Rules test suite against the Firestore emulator.
on:
  push:
    paths:
      - 'firebase/**'
      - '.github/workflows/firestore-rules.yml'
  pull_request:
    paths:
      - 'firebase/**'
      - '.github/workflows/firestore-rules.yml'
  workflow_dispatch:

jobs:
  rules-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        # The Firestore emulator is a Java process; firebase-tools requires JDK 21+.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: |
          npm install
          npm install -g firebase-tools

      - name: Run Firestore Rules tests
        run: npm run test:rules
