# ─── Cloud Build — Build & Deploy to Cloud Run ────────────────────────────────
#
# Trigger this manually or connect to a GitHub repo in Cloud Build console.
#
# Required one-time setup (run these in Cloud Shell or gcloud CLI):
#
#   1. Enable APIs:
#      gcloud services enable \
#        cloudbuild.googleapis.com \
#        run.googleapis.com \
#        secretmanager.googleapis.com \
#        artifactregistry.googleapis.com
#
#   2. Create Artifact Registry repo:
#      gcloud artifacts repositories create duitrip \
#        --repository-format=docker \
#        --location=us-central1
#
#   3. Store secrets in Secret Manager:
#      gcloud secrets create FIREBASE_SERVICE_ACCOUNT_JSON --data-file=- <<< '<paste json here>'
#      gcloud secrets create CLOUDFLARE_TURNSTILE_SECRET_KEY --data-file=- <<< '<your secret key>'
#
#   4. Grant Cloud Build SA access to Secret Manager:
#      PROJECT_NUMBER=$(gcloud projects describe duitrip --format='value(projectNumber)')
#      gcloud projects add-iam-policy-binding duitrip \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/secretmanager.secretAccessor"
#
#   5. Grant Cloud Build SA permission to deploy Cloud Run:
#      gcloud projects add-iam-policy-binding duitrip \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/run.admin"
#      gcloud iam service-accounts add-iam-policy-binding \
#        ${PROJECT_NUMBER}-compute@developer.gserviceaccount.com \
#        --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
#        --role="roles/iam.serviceAccountUser"

substitutions:
  _REGION: us-central1
  _SERVICE: duitrip
  _IMAGE: us-central1-docker.pkg.dev/duitrip/duitrip/app

  # ── Firebase project (non-sensitive, baked into the React bundle) ──────────
  _FIREBASE_PROJECT_ID: duitrip-prod
  _VITE_FIREBASE_API_KEY: ""
  _VITE_FIREBASE_AUTH_DOMAIN: duitrip-prod.firebaseapp.com
  _VITE_FIREBASE_PROJECT_ID: duitrip-prod
  _VITE_FIREBASE_STORAGE_BUCKET: duitrip-prod.appspot.com
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ""
  _VITE_FIREBASE_APP_ID: ""
  _VITE_TURNSTILE_SITE_KEY: ""

  # ── CORS allowed origins (comma-separated) ────────────────────────────────
  _ALLOWED_ORIGINS: https://duitrip.com,https://www.duitrip.com

steps:
  # ── Step 1: Build the Docker image ────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -f
      - Dockerfile
      - --build-arg
      - VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - --build-arg
      - VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - --build-arg
      - VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - --build-arg
      - VITE_TURNSTILE_SITE_KEY=${_VITE_TURNSTILE_SITE_KEY}
      - --build-arg
      - VITE_USE_FIREBASE_EMULATOR=false
      - -t
      - ${_IMAGE}:${COMMIT_SHA}
      - -t
      - ${_IMAGE}:latest
      - .

  # ── Step 2: Push image to Artifact Registry ────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_IMAGE}
    waitFor: [build]

  # ── Step 3: Deploy to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_IMAGE}:${COMMIT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --min-instances
      - "0"
      - --max-instances
      - "3"
      - --set-env-vars
      - ^;^FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID};ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}
      - --set-secrets
      - FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,CLOUDFLARE_TURNSTILE_SECRET_KEY=CLOUDFLARE_TURNSTILE_SECRET_KEY:latest
    waitFor: [push]

images:
  - ${_IMAGE}:${COMMIT_SHA}
  - ${_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
