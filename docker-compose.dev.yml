services:
  firebase-emulator:
    build:
      context: ./firebase
      dockerfile: Dockerfile.emulator
    working_dir: /app
    volumes:
      - ./firebase:/app
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
    environment:
      - FIREBASE_PROJECT_ID=demo-duitrip
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.local
    environment:
      - FIRESTORE_EMULATOR_HOST=firebase-emulator:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
    depends_on:
      firebase-emulator:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend
